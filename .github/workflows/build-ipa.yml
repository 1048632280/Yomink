name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  build:
    name: Build Yomink
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Yomink.xcodeproj -scheme Yomink

      - name: Build for device without signing
        run: |
          xcodebuild build \
            -project Yomink.xcodeproj \
            -scheme Yomink \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/Yomink.app Payload/
          zip -r Yomink-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yomink-unsigned-ipa
          path: Yomink-unsigned.ipa
